name: docker-image

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/docker-image.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "tsconfig.json"
      - "postcss.config.mjs"
      - "components.json"
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          BRANCH="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
          if [ -z "$BRANCH" ]; then
            BRANCH="ref"
          fi
          MESSAGE="$(git log -1 --pretty=%s)"

          {
            echo "image=${IMAGE}"
            echo "message=${MESSAGE}"
            echo "tags<<EOF"
            echo "${IMAGE}:${GITHUB_SHA}"
            echo "${IMAGE}:${BRANCH}"
            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VCS_REF=${{ github.sha }}
            VCS_MESSAGE=${{ steps.meta.outputs.message }}
          cache-from: type=gha,scope=music-qq-web
          cache-to: type=gha,mode=max,scope=music-qq-web
          tags: ${{ steps.meta.outputs.tags }}
