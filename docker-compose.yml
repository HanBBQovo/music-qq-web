name: music-qq-web

services:
  web:
    image: ${MUSIC_WEB_IMAGE:-ghcr.io/hanbbqovo/music-qq-web:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/music-api}
        BACKEND_API_URL: ${BACKEND_API_URL:-http://music-api:18880}
        VCS_REF: ${VCS_REF:-development}
        VCS_MESSAGE: ${VCS_MESSAGE:-local_build}
    container_name: music-web
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${WEB_PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:$${PORT:-3000}/api/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
